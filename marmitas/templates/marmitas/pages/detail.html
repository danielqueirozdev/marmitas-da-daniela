{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ marmita.nome }}</title>

    <link rel="stylesheet" href="{% static 'marmitas/css/detail.css' %}">
</head>
<body>

    <main class="container">
        <section class="marmita-card">

            <div class="marmita-image">
                <img src="https://placehold.co/700x500" alt="{{ marmita.nome }}">
            </div>

            <div class="marmita-content">
                <h1>{{ marmita.nome }}</h1>

                <p class="descricao">
                    {{ marmita.descricao }}
                </p>

                <div class="info-group">
                    <h2>Ingredientes</h2>

                    <p>
                        {{ marmita.ingredientes }}
                    </p>
                </div>

                <div class="details">
                    <div class="detail-box">
                        <span>Peso</span>
                        <strong>{{ marmita.peso }}g</strong>
                    </div>

                    <div class="detail-box">
                        <span>Preço</span>
                        <strong>R$ {{ marmita.preco }}</strong>
                    </div>
                </div>

                <button class="buy-button">
                    Pedir agora
                </button>
            </div>

        </section>
    </main>

</body>
</html>
