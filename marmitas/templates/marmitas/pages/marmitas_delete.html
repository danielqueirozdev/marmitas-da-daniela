{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deletar Marmita</title>
    <link rel="stylesheet" href="{% static 'marmitas/css/delete.css' %}">
</head>
<body>
    <div class="delete-container">
        <div class="delete-icon">🗑️</div>

        <h1>Tem certeza?</h1>

        <p>Você deseja deletar a marmita:</p>
        <p class="marmita-nome">{{ marmita.nome }}</p>

        <div class="delete-actions">
            <form method="POST">
                {% csrf_token %}
                <button type="submit">Confirmar exclusão</button>
            </form>

            <a href="{% url 'marmitas:home' %}" class="btn-cancel">Cancelar</a>
        </div>
    </div>
</body>
</html>
